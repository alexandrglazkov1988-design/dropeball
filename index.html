<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ВСПОМНИ ЛЕГЕНДУ</title>
<script src="images.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #1a6b3c;
    --green-dark: #0f4a2a;
    --white: #f5f5f5;
    --gold: #f0c040;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--green-dark);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .page {
    display: none;
    width: 100%;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 2rem;
    position: relative;
  }
  .page.active { display: flex; }

  .page::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: url('bg.png') center/cover no-repeat;
    pointer-events: none;
    z-index: 0;
  }

  .landing-content { text-align: center; z-index: 1; position: relative; }
  .landing-logo {
    width: 280px;
    height: 280px;
    margin: 0 auto 1rem;
  }
  .landing-logo img { width: 100%; height: 100%; object-fit: contain; }

  .subtitle {
    font-size: 0.8rem;
    font-weight: 300;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 0.3rem;
    opacity: 0.8;
  }

  .main-title {
    font-size: clamp(2rem, 8vw, 5.5rem);
    font-weight: 900;
    letter-spacing: 6px;
    line-height: 1.1;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 30%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1.5rem;
    position: relative;
  }

  .main-title::after {
    content: '';
    display: block;
    width: 60px;
    height: 3px;
    background: var(--gold);
    margin: 1rem auto 0;
    border-radius: 2px;
  }

  .btn {
    display: inline-block;
    padding: 0.8rem 2.5rem;
    font-family: 'Montserrat', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--white);
    background: linear-gradient(135deg, var(--green), #2d8f56);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    border-color: var(--gold);
  }

  .btn:active { transform: translateY(0) scale(0.98); }

  .btn-gold {
    background: linear-gradient(135deg, #d4a017, #f0c040);
    color: #1a1a1a;
    border-color: var(--gold);
    box-shadow: 0 4px 20px rgba(240, 192, 64, 0.3);
  }

  .btn-gold:hover { border-color: #fff; }

  .deco-circle {
    position: fixed;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.05);
    pointer-events: none;
    z-index: 0;
  }
  .deco-circle:nth-child(1) { width: 400px; height: 400px; top: -100px; right: -100px; }
  .deco-circle:nth-child(2) { width: 300px; height: 300px; bottom: -50px; left: -50px; border-color: rgba(240, 192, 64, 0.08); }
  .deco-circle:nth-child(3) { width: 150px; height: 150px; top: 50%; left: 10%; border-color: rgba(255,255,255,0.03); }

  .site-logo {
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 10;
    width: 180px;
    height: 180px;
    opacity: 0.96;
    transition: opacity 0.3s ease;
  }
  .site-logo:hover { opacity: 1; }
  .site-logo img { width: 100%; height: 100%; object-fit: contain; }
  .site-logo--game {
    width: 180px !important;
    height: 180px !important;
    top: 30px !important;
    left: 60px !important;
    transform: none !important;
  }

  .thankyou-logo {
    width: 160px;
    height: 160px;
    margin: 0 auto 1rem;
  }
  .thankyou-logo img { width: 100%; height: 100%; object-fit: contain; }

  /* === GAME PAGE === */
  #gamePage { padding-top: 0.5rem; justify-content: flex-start; }

  .game-header {
    width: 100%;
    max-width: 540px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.3rem 0.5rem;
    margin-bottom: 0.3rem;
    z-index: 1;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .game-logo {
    font-size: 0.75rem;
    font-weight: 300;
    letter-spacing: 6px;
    color: var(--white);
    text-transform: uppercase;
  }

  .player-name-display {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--white);
    background: rgba(255,255,255,0.08);
    padding: 0.4rem 1.2rem;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .counter-display {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--white);
    background: rgba(255,255,255,0.08);
    padding: 0.4rem 1.2rem;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .game-card {
    width: 100%;
    max-width: 340px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 1rem;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: var(--shadow);
    z-index: 1;
    margin-bottom: 0.5rem;
  }

  .shirt-image-wrapper {
    width: 100%;
    aspect-ratio: 3/4;
    border-radius: 12px;
    overflow: hidden;
    background: rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 0.6rem;
    position: relative;
  }

  .shirt-image-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: transform 0.5s ease;
    padding: 4px;
  }

  .shirt-image-wrapper img:hover { transform: scale(1.02); }

  .shirt-caption {
    text-align: center;
    font-size: 0.65rem;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .input-group { margin-bottom: 0.5rem; }

  .input-group label {
    display: block;
    font-size: 0.6rem;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 0.3rem;
  }

  .input-row {
    display: flex;
    gap: 0.5rem;
    align-items: stretch;
  }

  .input-row .input-field {
    flex: 1;
    padding: 0.6rem 0.9rem;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--white);
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    outline: none;
    transition: all 0.3s ease;
  }

  .input-field:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.1);
    box-shadow: 0 0 20px rgba(240, 192, 64, 0.1);
  }

  .input-field::placeholder { color: rgba(255,255,255,0.2); }

  .mic-btn {
    flex-shrink: 0;
    width: 42px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    font-size: 1.2rem;
    padding: 0;
  }

  .mic-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(240, 192, 64, 0.08);
  }

  .mic-btn.listening {
    border-color: #e74c3c;
    color: #e74c3c;
    background: rgba(231, 76, 60, 0.1);
    animation: pulse-mic 1s ease-in-out infinite;
  }

  @keyframes pulse-mic {
    0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.3); }
    50% { box-shadow: 0 0 0 8px rgba(231, 76, 60, 0); }
  }

  .game-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.6rem;
  }
  .game-actions .btn-gold {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 0.5rem 0.6rem;
    letter-spacing: 0;
    font-size: 0.6rem;
  }

  .btn-small {
    padding: 0.6rem 0.8rem;
    font-size: 0.7rem;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .btn-ghost {
    background: transparent;
    border-color: rgba(255,255,255,0.15);
    box-shadow: none;
  }

  .btn-ghost:hover {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.3);
    transform: translateY(-2px);
  }

  .result-message {
    text-align: center;
    padding: 0.4rem;
    border-radius: 10px;
    margin-top: 0.5rem;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
    display: none;
  }

  .result-message.done {
    display: block;
    background: rgba(240, 192, 64, 0.12);
    color: var(--white);
    border: 1px solid rgba(240, 192, 64, 0.2);
  }

  .result-message .praise {
    display: block;
    font-size: 1.2rem;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 0.1rem;
  }

  .result-message .answer-detail {
    display: block;
    font-size: 0.65rem;
    font-weight: 400;
    opacity: 0.7;
    letter-spacing: 1px;
  }

  .result-message.saved {
    display: block;
    background: rgba(46, 204, 113, 0.12);
    color: #2ecc71;
    border: 1px solid rgba(46, 204, 113, 0.2);
  }
  .result-message.warning {
    display: block;
    background: rgba(231, 76, 60, 0.08);
    color: #e67e22;
    border: 1px solid rgba(231, 76, 60, 0.2);
  }
  .result-message.wrong {
    display: block;
    background: rgba(231, 76, 60, 0.12);
    color: #e74c3c;
    border: 1px solid rgba(231, 76, 60, 0.2);
  }

  /* === NAME INPUT === */
  .name-screen {
    width: 100%;
    max-width: 420px;
    z-index: 1;
    text-align: center;
  }
  .name-screen .game-card {
    text-align: center;
    margin-left: auto;
    margin-right: auto;
    width: 100%;
  }
  .name-screen .main-title { font-size: clamp(1.5rem, 4vw, 2.5rem); margin-bottom: 0.6rem; }
  .name-screen .main-title::after { display: none; }
  .name-logo {
    width: 160px;
    height: 160px;
    margin: 0 auto 0.5rem;
  }
  .name-logo img { width: 100%; height: 100%; object-fit: contain; }

  /* === THANK YOU === */
  .thankyou-screen { text-align: center; z-index: 1; display: flex; flex-direction: column; align-items: center; }
  .thankyou-screen .main-title { font-size: clamp(1.5rem, 4vw, 3rem); margin-bottom: 0.6rem; }
  .thankyou-screen .main-title::after { display: none; }
  .thankyou-text {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 6px;
    line-height: 1.5;
    margin-bottom: 1.5rem;
    color: rgba(255,255,255,0.85);
  }
  .social-section {
    margin-top: 1.5rem;
    text-align: center;
  }
  .social-text {
    font-size: 0.65rem;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 0.5rem;
  }
  .social-icon {
    display: inline-block;
    opacity: 0.5;
    transition: opacity 0.3s ease;
  }
  .social-icon:hover { opacity: 1; }

  /* === PROGRESS === */
  .progress {
    display: flex;
    gap: 5px;
    justify-content: center;
    margin-bottom: 0.5rem;
    z-index: 1;
  }
  .progress-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    transition: all 0.3s ease;
  }
  .progress-dot.active { background: var(--gold); transform: scale(1.3); box-shadow: 0 0 8px rgba(240,192,64,0.4); }
  .progress-dot.filled { background: #2ecc71; }

  @media (max-height: 750px) {
    .page { padding: 1rem 1.5rem; }
    .game-card { padding: 0.8rem; max-width: 300px; }
    .input-field { padding: 0.5rem 0.7rem; font-size: 0.8rem; }
    .game-actions { margin-top: 0.4rem; }
    .btn { padding: 0.5rem 1.2rem; font-size: 0.8rem; }
    .site-logo { width: 100px; height: 100px; top: 0.6rem; left: 0.6rem; }
    .result-message .praise { font-size: 1rem; }
    .main-title { font-size: clamp(1.6rem, 6vw, 4rem); margin-bottom: 1rem; }
    .shirt-caption { font-size: 0.6rem; margin-bottom: 0.4rem; padding-bottom: 0.3rem; }
    .shirt-image-wrapper { margin-bottom: 0.4rem; }
    .input-group { margin-bottom: 0.4rem; }
    .input-group label { font-size: 0.55rem; }
    .game-actions .btn-small { padding: 0.5rem 0.6rem; font-size: 0.65rem; }
  }

  @media (max-width: 600px) {
    .page { padding: 0.8rem 1rem; }
    .game-card { padding: 0.8rem; max-width: 300px; }
    .game-header { padding: 0.2rem 0; }
    .game-header .game-logo { display: none; }
    .site-logo { width: 80px; height: 80px; top: 0.5rem; left: 0.5rem; }
    .site-logo--game { width: 120px !important; height: 120px !important; top: 10px !important; left: 10px !important; }
    .landing-logo { width: 200px; height: 200px; }
    .result-message .praise { font-size: 1rem; }
    .main-title { font-size: clamp(1.4rem, 7vw, 2.5rem); margin-bottom: 0.8rem; }
    .main-title::after { width: 40px; height: 2px; margin-top: 0.6rem; }
    .subtitle { letter-spacing: 6px; font-size: 0.65rem; }
    .game-actions .btn-gold { font-size: 0.55rem; padding: 0.4rem 0.5rem; }
  }
  @media (max-width: 420px) {
    .page { padding: 0.5rem 0.6rem; }
    .game-card { padding: 0.6rem; max-width: 280px; }
    .landing-logo { width: 160px; height: 160px; }
    .site-logo--game { width: 80px !important; height: 80px !important; top: 5px !important; left: 5px !important; }
    .btn { padding: 0.4rem 1rem; font-size: 0.7rem; letter-spacing: 2px; }
    .main-title { font-size: clamp(1.2rem, 6vw, 2rem); }
    .thankyou-text { font-size: 1.2rem; letter-spacing: 3px; }
  }
</style>
</head>
<body>

<div class="deco-circle"></div>
<div class="deco-circle"></div>
<div class="deco-circle"></div>

<!-- ====== LANDING PAGE ====== -->
<div id="landingPage" class="page active">
  <div class="landing-content">
    <div class="landing-logo">
      <img id="landingLogoImg" src="" alt="Логотип">
    </div>
    <p class="subtitle">игра</p>
    <h1 class="main-title">ВСПОМНИ<br>ЛЕГЕНДУ</h1>
    <button class="btn btn-gold" onclick="showNameScreen()">ИГРАЕМ</button>
  </div>
</div>

<!-- ====== NAME INPUT ====== -->
<div id="namePage" class="page">
  <div class="name-screen">
    <div class="name-logo">
      <img id="nameLogoImg" src="" alt="Логотип">
    </div>
    <p class="subtitle" style="margin-bottom:0.3rem;">игра</p>
    <h1 class="main-title">ВСПОМНИ ЛЕГЕНДУ</h1>
    <div class="game-card">
      <div class="input-group">
        <label>Введи свое имя</label>
        <input type="text" id="playerNameInput" class="input-field" placeholder="Твое имя..." maxlength="20" onkeydown="if(event.key==='Enter') startGame()" style="color:#f5f5f5;">
      </div>
      <button class="btn btn-gold" style="width:100%;" onclick="startGame()">ГАЗУЙ!</button>
    </div>
  </div>
</div>

<!-- ====== GAME PAGE ====== -->
<div id="gamePage" class="page">
  <div class="game-header">
    <span class="game-logo">игра</span>
    <span class="player-name-display" id="nameDisplay"></span>
    <span class="counter-display" id="counterDisplay">1 / 6</span>
  </div>

  <div class="progress" id="progressDots"></div>

  <div class="game-card">
    <div class="shirt-image-wrapper">
      <img id="shirtImage" src="" alt="Футболка">
    </div>
    <div class="shirt-caption" id="shirtCaption">—</div>

    <div class="input-group">
      <label>Фамилия игрока, который ассоциируется с этой футболкой</label>
      <div class="input-row">
        <input type="text" id="guessInput" class="input-field" placeholder="Например: Марадона..." maxlength="50" onkeydown="if(event.key==='Enter') saveAnswer()">
        <button type="button" class="mic-btn" id="micBtn" onclick="toggleSpeech()" title="Голосовой ввод">🎤</button>
      </div>
    </div>

    <div class="result-message" id="resultMessage"></div>

    <div class="game-actions">
      <button class="btn btn-gold" style="flex:1;" onclick="saveAnswer()">
        <span id="actionBtnText">ГОТОВО</span>
      </button>
      <button class="btn btn-ghost btn-small" onclick="skipAnswer()">НИКОГО НЕ ПОМНЮ</button>
    </div>
  </div>
</div>

<!-- ====== THANK YOU PAGE ====== -->
<div id="thankyouPage" class="page">
  <div class="thankyou-screen">
    <div class="thankyou-logo">
      <img id="thanksLogoImg" src="" alt="Логотип">
    </div>
    <h1 class="main-title">СПАСИБО ЗА ВОСПОМИНАНИЯ!</h1>
    <div class="thankyou-text">
      Любите эту игру!
    </div>
    <button class="btn btn-ghost" onclick="location.reload()" style="padding:0.7rem 2.5rem;font-size:0.85rem;">ЗАНОВО</button>
    <div class="social-section">
      <p class="social-text">подпишись на нас</p>
      <a class="social-icon" href="https://instagram.com/dropeball" target="_blank" rel="noopener">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f5f5f5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
        </svg>
      </a>
    </div>
    <div id="saveMessage" class="result-message" style="margin-top:1rem;"></div>
  </div>
</div>

<a class="site-logo" href="#">
  <img id="siteLogoImg" src="" alt="Логотип">
</a>

<script>

const LANG = {

function getLocalizedPraise(country) {
  return LANG[country] || 'Отлично!';
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => new Uint8Array(n + 1));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
  return dp[m][n];
}

function normalize(str) {
  return str.toLowerCase().replace(/[^а-яёa-z0-9]/g, '');
}

function checkPlayer(surname, shirtName) {
  const players = PLAYER_DB[shirtName];
  if (!players) return { found: true, exact: true, distance: 0, closest: '' };
  const norm = normalize(surname);
  if (!norm) return { found: false, distance: Infinity, closest: '' };
  let best = Infinity, bestName = '';
  for (const p of players) {
    const d = levenshtein(norm, normalize(p));
    if (d < best) { best = d; bestName = p; }
  }
  return { found: best <= 2, exact: best === 0, distance: best, closest: bestName };
}

let playerName = '';

let gameShirts = [];
let answers = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Group shirts by country, then pick 6 from different countries
function pickGameShirts() {
  const byCountry = {};
  for (const name of SHIRTS) {
    const country = name.split('_')[0];
    if (!byCountry[country]) byCountry[country] = [];
    byCountry[country].push(name);
  }

  const countries = shuffle(Object.keys(byCountry));
  const selected = [];
  for (let i = 0; i < SHIRTS_PER_GAME && i < countries.length; i++) {
    const country = countries[i];
    const shirts = byCountry[country];
    selected.push(shirts[Math.floor(Math.random() * shirts.length)]);
  }
  return shuffle(selected);
}

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

function showNameScreen() {
  document.querySelector('.site-logo').classList.remove('site-logo--game');

  document.getElementById('playerNameInput').focus();
}

function startGame() {
  const name = document.getElementById('playerNameInput').value.trim();
  if (!name) {
    const input = document.getElementById('playerNameInput');
    input.style.borderColor = '#e74c3c';
    setTimeout(() => input.style.borderColor = '', 800);
    return;
  }
  playerName = name;
  answers = [];
  currentIndex = 0;
  gameShirts = pickGameShirts();

  document.getElementById('nameDisplay').textContent = '⚽ ' + playerName;
  const gameLogo = document.querySelector('.site-logo');
  gameLogo.classList.add('site-logo--game');

  buildProgress();
  showShirt();
}

function buildProgress() {
  const container = document.getElementById('progressDots');
  container.innerHTML = '';
  for (let i = 0; i < gameShirts.length; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (i === 0 ? ' active' : '');
    dot.id = 'dot-' + i;
    container.appendChild(dot);
  }
}

function showShirt() {
  if (currentIndex >= gameShirts.length) {
    showThankYou();
    return;
  }

  const name = gameShirts[currentIndex];
  const fullCaption = name.replace(/_/g, ' ');

  retryAttempt = false;
  document.getElementById('shirtImage').src = IMAGES[name];
  document.getElementById('shirtCaption').textContent = fullCaption;
  document.getElementById('guessInput').value = '';
  document.getElementById('guessInput').disabled = false;
  document.getElementById('guessInput').focus();
  document.getElementById('resultMessage').className = 'result-message';
  document.getElementById('resultMessage').textContent = '';
  document.getElementById('counterDisplay').textContent = (currentIndex + 1) + ' / ' + gameShirts.length;
  document.getElementById('actionBtnText').textContent = 'ГОТОВО';

  updateProgress();
}

function updateProgress() {
  for (let i = 0; i < gameShirts.length; i++) {
    const dot = document.getElementById('dot-' + i);
    if (i < currentIndex) {
      dot.className = 'progress-dot filled';
    } else if (i === currentIndex) {
      dot.className = 'progress-dot active';
    } else {
      dot.className = 'progress-dot';
    }
  }
}

let recognition = null;
let isListening = false;

function toggleSpeech() {
  const btn = document.getElementById('micBtn');
  const input = document.getElementById('guessInput');

  if (isListening) {
    if (recognition) recognition.stop();
    btn.classList.remove('listening');
    btn.textContent = '🎤';
    isListening = false;
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    btn.textContent = '✗';
    setTimeout(() => { btn.textContent = '🎤'; }, 1500);
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'ru-RU';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    btn.classList.add('listening');
    btn.textContent = '⏺';
  };

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    input.value = transcript.charAt(0).toUpperCase() + transcript.slice(1);
    btn.classList.remove('listening');
    btn.textContent = '🎤';
    isListening = false;
  };

  recognition.onerror = () => {
    btn.classList.remove('listening');
    btn.textContent = '🎤';
    isListening = false;
  };

  recognition.onend = () => {
    btn.classList.remove('listening');
    btn.textContent = '🎤';
    isListening = false;
  };

  recognition.start();
}

function saveAnswer() {
  if (currentIndex >= gameShirts.length) return;

  const surname = document.getElementById('guessInput').value.trim();
  if (!surname) {
    const input = document.getElementById('guessInput');
    input.style.borderColor = '#e74c3c';
    setTimeout(() => input.style.borderColor = '', 500);
    return;
  }

  submitAnswer(surname);
}

function skipAnswer() {
  if (currentIndex >= gameShirts.length) return;
  submitAnswer('—');
}

function submitAnswer(surname) {
  const photoName = gameShirts[currentIndex];
  const fullCaption = photoName.replace(/_/g, ' ');
  const country = photoName.split('_')[0];

  const isSkipped = surname === '—';

  if (isSkipped) {
    answers.push({
      playerName, photo: photoName + '.JPG', photoDisplay: fullCaption,
      surname, correct: false, expected: ''
    });
    retryAttempt = false;
    showPraise('✎ ПРОПУЩЕНО', fullCaption, 'done');
    lockAndAdvance();
    return;
  }

  const result = checkPlayer(surname, photoName);

  if (result.found) {
    answers.push({
      playerName, photo: photoName + '.JPG', photoDisplay: fullCaption,
      surname, correct: true, expected: result.exact ? '' : result.closest
    });
    retryAttempt = false;
    showPraise(getLocalizedPraise(country), surname + ' · ' + fullCaption, 'done');
    lockAndAdvance();
  } else {
    if (retryAttempt) {
      answers.push({
        playerName, photo: photoName + '.JPG', photoDisplay: fullCaption,
        surname, correct: false, expected: result.closest
      });
      retryAttempt = false;
      showPraise('ТАКИХ ТАМ НЕ БЫЛО!', surname + ' · ' + fullCaption, 'wrong');
      lockAndAdvance();
    } else {
      retryAttempt = true;
      showPraise('⚠ НЕ ПОХОЖЕ', 'Таких там не было!', 'warning');
      document.getElementById('guessInput').disabled = false;
      document.getElementById('guessInput').focus();
      document.getElementById('actionBtnText').textContent = 'ПОВТОРИТЬ';
    }
  }
}

function showPraise(praise, detail, className) {
  document.getElementById('shirtCaption').textContent = gameShirts[currentIndex].replace(/_/g, ' ');
  const rm = document.getElementById('resultMessage');
  rm.className = 'result-message ' + className;
  rm.innerHTML = '<span class="praise">' + praise + '</span><span class="answer-detail">' + detail + '</span>';
}

function lockAndAdvance() {
  document.getElementById('guessInput').disabled = true;
  document.getElementById('actionBtnText').textContent = 'ДАЛЕЕ →';
  document.getElementById('guessInput').style.borderColor = '';
  document.getElementById('dot-' + currentIndex).className = 'progress-dot filled';
  setTimeout(() => {
    currentIndex++;
    showShirt();
  }, 700);
}

function showThankYou() {
  document.querySelector('.site-logo').classList.remove('site-logo--game');
  document.querySelector('.site-logo').style.display = 'none';
  showPage('thankyouPage');
  saveToLocalStorage();
  setTimeout(() => {
    try { downloadExcel(); } catch (e) { console.log('Excel download unavailable offline'); }
  }, 500);
}

function saveToLocalStorage() {
  try {
    const existing = JSON.parse(localStorage.getItem('vspomniLegendData') || '[]');
    existing.push(...answers);
    localStorage.setItem('vspomniLegendData', JSON.stringify(existing));

    const msg = document.getElementById('saveMessage');
    msg.className = 'result-message saved';
    msg.textContent = '✓ Данные сохранены (' + answers.length + ' ответов)';
  } catch (e) {
    console.error('Save error:', e);
  }
}

function downloadExcel() {
  if (typeof XLSX === 'undefined') return;
  let allData;
  try {
    allData = JSON.parse(localStorage.getItem('vspomniLegendData') || '[]');
  } catch (e) {
    allData = [];
  }

  if (allData.length === 0) return;

  const excelRows = [];
  for (const r of allData) {
    excelRows.push({
      'Имя участника': r.playerName,
      'Футболка': r.photo,
      'Фамилия игрока': r.surname,
      'Верно': r.correct ? 'Да' : 'Нет',
      'Ожидалось': r.expected || ''
    });
  }

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(excelRows);
  ws['!cols'] = [{ wch: 20 }, { wch: 35 }, { wch: 25 }, { wch: 8 }, { wch: 25 }];
  XLSX.utils.book_append_sheet(wb, ws, 'Результаты');
  XLSX.writeFile(wb, 'Вспомни_Легенду_результаты.xlsx');
}
